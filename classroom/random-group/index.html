<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모둠 구성 도우미 — 과학 도구상자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="../../toolbox-nav.js"></script>
  <style>
    :root {
      --bg:        #F5F3FF;
      --surface:   #FFFFFF;
      --surface-2: #FAFAFA;
      --border:    #E4E0F5;
      --border2:   #C4BAE8;
      --accent:    #6D28D9;
      --accent-dk: #5B21B6;
      --accent-lt: #EDE9FE;
      --text:      #1E1B33;
      --muted:     #6B6888;
      --subtle:    #9B98B8;
      --radius:    12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .page { max-width: 960px; margin: 0 auto; padding: 4rem 1.5rem 3rem; }

    /* ── 헤더 ── */
    .header { margin-bottom: 2rem; }
    .badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-lt);
      padding: .3rem .75rem;
      border-radius: 999px;
      margin-bottom: .85rem;
    }
    .page-title {
      font-family: 'Gowun Batang', serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: .45rem;
    }
    .page-desc { font-size: .97rem; color: var(--muted); line-height: 1.6; }

    /* ── 패널 ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      margin-bottom: 1rem;
    }
    .panel-title {
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .9rem;
    }

    /* ── 이름 입력 ── */
    #names {
      width: 100%;
      height: 140px;
      padding: .8rem 1rem;
      font-family: inherit;
      font-size: .95rem;
      line-height: 1.7;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      resize: vertical;
      transition: border-color .15s;
    }
    #names:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(109,40,217,.1); }
    #names::placeholder { color: var(--subtle); }
    .names-hint { font-size: .82rem; color: var(--subtle); margin-top: .55rem; }
    .names-hint strong { color: var(--accent); font-weight: 600; }

    /* ── 모둠 수 설정 ── */
    .group-count-row { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .num-stepper {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: .3rem;
    }
    .step-btn {
      width: 36px; height: 36px;
      border: none; background: transparent;
      font-size: 1.3rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .step-btn:hover:not(:disabled) { background: var(--accent-lt); color: var(--accent); }
    .step-btn:active:not(:disabled) { transform: scale(.94); }
    .step-btn:disabled { opacity: .35; cursor: not-allowed; }
    .num-value {
      min-width: 44px; text-align: center;
      font-size: 1.15rem; font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .num-hint { font-size: .88rem; color: var(--muted); }

    /* ── 버튼 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .68rem 1.4rem;
      font-family: inherit;
      font-size: .94rem;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dk); }
    .btn-primary:active:not(:disabled) { transform: scale(.97); }
    .btn-ghost {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .build-btn-row { margin-top: 1.1rem; }

    /* ── 대기 영역 ── */
    .pool-section {
      margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px dashed var(--border);
    }
    .pool-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: .65rem;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .pool-label {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
    }
    .pool-label .count { color: var(--accent); font-weight: 700; }
    .pool-hint { font-size: .78rem; color: var(--subtle); }

    #pool {
      background: var(--surface-2);
      border: 1.5px dashed var(--border2);
      border-radius: 10px;
      padding: 12px;
      min-height: 76px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-content: flex-start;
    }
    #pool.dragover { border-color: var(--accent); background: var(--accent-lt); }
    #pool .empty-msg {
      width: 100%;
      text-align: center;
      color: var(--subtle);
      font-size: .85rem;
      padding: .65rem 0;
    }

    /* ── 이름 칩 ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: .4rem .75rem;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      font-size: .9rem;
      color: var(--text);
      cursor: grab;
      user-select: none;
      transition: transform .12s, box-shadow .12s, border-color .12s;
    }
    .chip:hover { border-color: var(--accent); box-shadow: 0 2px 6px rgba(109,40,217,.12); }
    .chip:active { cursor: grabbing; }
    .chip.is-manual {
      background: var(--g-light, var(--accent-lt));
      border-color: var(--g-color, var(--accent));
      color: var(--g-color, var(--accent));
      font-weight: 600;
    }
    .chip.is-auto {
      background: var(--g-light, var(--accent-lt));
      border-color: transparent;
      color: var(--g-dark, var(--accent-dk));
    }
    .chip .pin {
      font-size: .7rem;
      opacity: .7;
    }

    /* Sortable 드래그 중 스타일 */
    .sortable-ghost { opacity: .35; }
    .sortable-drag { box-shadow: 0 6px 16px rgba(0,0,0,.15); transform: rotate(-2deg); }
    .sortable-chosen { cursor: grabbing; }

    /* ── 모둠 카드 그리드 ── */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: .85rem;
    }
    .group-card {
      background: var(--surface);
      border: 1.5px solid var(--g-border, var(--border));
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 130px;
    }
    .group-card.dragover { border-color: var(--g-color, var(--accent)); border-style: solid; }
    .group-header {
      background: var(--g-color, var(--accent));
      color: white;
      padding: .55rem 1rem;
      font-size: .9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .group-count {
      font-size: .75rem;
      font-weight: 500;
      opacity: .8;
    }
    .group-body {
      padding: .65rem .75rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-height: 70px;
    }
    .group-body .empty-drop {
      text-align: center;
      color: var(--subtle);
      font-size: .8rem;
      margin: auto 0;
      padding: .35rem 0;
    }

    /* ── 액션 ── */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: .65rem;
      margin-top: 1.25rem;
    }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--text);
      color: white;
      padding: .65rem 1.2rem;
      border-radius: 999px;
      font-size: .88rem;
      font-weight: 500;
      opacity: 0;
      transition: transform .25s, opacity .25s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── 모바일 ── */
    @media (max-width: 540px) {
      .page { padding: 3.5rem 1rem 2.5rem; }
      .panel { padding: 1.1rem 1.1rem; }
      .groups-grid { grid-template-columns: 1fr 1fr; gap: .6rem; }
      .group-card { min-height: 110px; }
      .group-header { padding: .5rem .75rem; font-size: .85rem; }
      .group-body { padding: .55rem .6rem; }
      .chip { font-size: .85rem; padding: .35rem .65rem; }
    }

    /* ── 인쇄 스타일 ── */
    @media print {
      body { background: white; }
      .page { padding: 1rem; }
      .header .badge, .panel:not(.work-panel), .actions, .toolbox-back-link { display: none !important; }
      .pool-section { display: none; }
      .work-panel { border: none; padding: 0; }
      .panel-title { display: none; }
      .groups-grid { grid-template-columns: repeat(3, 1fr); gap: .5rem; }
      .group-card { border: 1px solid #ccc !important; break-inside: avoid; min-height: auto; }
      .group-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .chip { background: #f5f5f5 !important; border-color: #ddd !important; color: #333 !important; }
    }
  </style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="badge">학급 운영</div>
    <h1 class="page-title">모둠 구성 도우미</h1>
    <p class="page-desc">학생 이름을 박스로 만들어 직접 드래그하거나, 나머지를 랜덤으로 배치합니다. 미리 짝짓고 싶은 학생은 수동으로 모둠에 넣으세요.</p>
  </header>

  <!-- ① 이름 입력 -->
  <div class="panel">
    <div class="panel-title">① 학생 이름 입력</div>
    <textarea id="names" placeholder="이름을 한 줄에 한 명씩 입력하거나 붙여넣으세요.
예:
김민준
이서연
박도윤
최지아"></textarea>
    <p class="names-hint" id="name-count">아직 입력된 이름이 없습니다.</p>
    <div class="build-btn-row">
      <button class="btn btn-primary" id="build-btn" type="button" disabled>📝 이름 박스 만들기 →</button>
    </div>
  </div>

  <!-- ② 모둠 수 설정 -->
  <div class="panel">
    <div class="panel-title">② 모둠 수 설정</div>
    <div class="group-count-row">
      <div class="num-stepper">
        <button class="step-btn" id="dec-btn" type="button" aria-label="모둠 수 줄이기">−</button>
        <span class="num-value" id="num-value">4</span>
        <button class="step-btn" id="inc-btn" type="button" aria-label="모둠 수 늘리기">+</button>
      </div>
      <span class="num-hint" id="num-hint">총 모둠 수 (2~10 사이)</span>
    </div>
  </div>

  <!-- ③ 작업 영역 -->
  <div class="panel work-panel">
    <div class="panel-title">③ 모둠 배치 — 드래그 또는 랜덤</div>

    <div class="pool-section">
      <div class="pool-header">
        <span class="pool-label">⊟ 대기 <span class="count" id="pool-count">0</span>명</span>
        <span class="pool-hint">이름 칩을 드래그해 모둠 카드로 옮기세요</span>
      </div>
      <div id="pool"></div>
    </div>

    <div class="groups-grid" id="groups-grid"></div>
  </div>

  <!-- 액션 -->
  <div class="actions">
    <button class="btn btn-primary" id="random-btn" type="button" disabled>🎲 나머지 랜덤 배치</button>
    <button class="btn btn-ghost" id="reshuffle-btn" type="button" disabled>↺ 자동 배치만 다시 섞기</button>
    <button class="btn btn-ghost" id="copy-btn" type="button" disabled>📋 결과 복사</button>
    <button class="btn btn-ghost" id="print-btn" type="button" disabled>🖨️ 인쇄</button>
    <button class="btn btn-ghost" id="reset-btn" type="button" style="margin-left: auto;">↶ 처음부터</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ── 모둠 색상 팔레트 (최대 10모둠) ──
const PALETTE = [
  { color: '#6D28D9', light: '#EDE9FE', dark: '#5B21B6' }, // 보라
  { color: '#0E7490', light: '#E0F2FE', dark: '#075985' }, // 청록
  { color: '#B45309', light: '#FEF3C7', dark: '#92400E' }, // 호박
  { color: '#15803D', light: '#DCFCE7', dark: '#166534' }, // 초록
  { color: '#BE123C', light: '#FFE4E6', dark: '#9F1239' }, // 진홍
  { color: '#1D4ED8', light: '#DBEAFE', dark: '#1E40AF' }, // 파랑
  { color: '#9333EA', light: '#F3E8FF', dark: '#7E22CE' }, // 자주
  { color: '#0891B2', light: '#CFFAFE', dark: '#0E7490' }, // 시안
  { color: '#CA8A04', light: '#FEF9C3', dark: '#A16207' }, // 머스타드
  { color: '#65A30D', light: '#ECFCCB', dark: '#4D7C0F' }  // 라임
];

// ── 상태 ──
let students  = [];   // [{ id, name, state: 'pool'|'manual'|'auto', group: number|null }]
let numGroups = 4;
let nextId    = 1;

// ── DOM 참조 ──
const namesEl       = document.getElementById('names');
const nameCountEl   = document.getElementById('name-count');
const buildBtn      = document.getElementById('build-btn');
const numValueEl    = document.getElementById('num-value');
const numHintEl     = document.getElementById('num-hint');
const decBtn        = document.getElementById('dec-btn');
const incBtn        = document.getElementById('inc-btn');
const poolEl        = document.getElementById('pool');
const poolCountEl   = document.getElementById('pool-count');
const groupsGridEl  = document.getElementById('groups-grid');
const randomBtn     = document.getElementById('random-btn');
const reshuffleBtn  = document.getElementById('reshuffle-btn');
const copyBtn       = document.getElementById('copy-btn');
const printBtn      = document.getElementById('print-btn');
const resetBtn      = document.getElementById('reset-btn');

// ── 입력 영역 ──
namesEl.addEventListener('input', updateNameCount);

function updateNameCount() {
  const parsed = parseNames();
  if (parsed.length === 0) {
    nameCountEl.textContent = '아직 입력된 이름이 없습니다.';
    buildBtn.disabled = true;
  } else {
    const groupSize = (parsed.length / numGroups);
    const small = Math.floor(groupSize);
    const big = Math.ceil(groupSize);
    const sizeHint = (small === big) ? `${small}명씩` : `약 ${small}~${big}명씩`;
    nameCountEl.innerHTML = `총 <strong>${parsed.length}명</strong> 입력됨 → ${numGroups}모둠 (${sizeHint})`;
    buildBtn.disabled = false;
  }
}

function parseNames() {
  return namesEl.value
    .split('\n')
    .map(s => s.trim())
    // 엑셀에서 복사할 때 "1\t김민준" 같은 형태도 처리
    .map(s => s.replace(/^\d+[\s\t.)\-]+/, '').trim())
    .filter(s => s.length > 0);
}

// ── 모둠 수 조절 ──
decBtn.addEventListener('click', () => changeGroups(numGroups - 1));
incBtn.addEventListener('click', () => changeGroups(numGroups + 1));

function changeGroups(newCount) {
  newCount = Math.max(2, Math.min(10, newCount));
  if (newCount === numGroups) return;

  // 줄이는 경우: 사라지는 모둠의 학생을 대기로 보냄
  if (newCount < numGroups) {
    students.forEach(s => {
      if (s.group !== null && s.group >= newCount) {
        s.state = 'pool';
        s.group = null;
      }
    });
  }

  numGroups = newCount;
  numValueEl.textContent = numGroups;
  decBtn.disabled = numGroups <= 2;
  incBtn.disabled = numGroups >= 10;

  updateNameCount();
  if (students.length > 0) render();
}

// ── 이름 박스 만들기 ──
buildBtn.addEventListener('click', () => {
  const names = parseNames();
  if (names.length === 0) return;

  // 기존 데이터가 있으면 확인 (간단히: 그냥 덮어쓰기 + 토스트로 알림)
  const hadData = students.length > 0;
  students = names.map(n => ({
    id: nextId++,
    name: n,
    state: 'pool',
    group: null
  }));

  render();
  enableActionButtons();
  if (hadData) showToast('이름 박스를 새로 만들었습니다.');
});

// ── 렌더링 ──
function render() {
  renderPool();
  renderGroups();
  updateCounts();
  updateActionButtons();
}

function renderPool() {
  poolEl.innerHTML = '';
  const poolStudents = students.filter(s => s.state === 'pool');

  if (students.length === 0) {
    poolEl.innerHTML = '<div class="empty-msg">이름을 입력한 뒤 「이름 박스 만들기」를 눌러주세요</div>';
    return;
  }
  if (poolStudents.length === 0) {
    poolEl.innerHTML = '<div class="empty-msg">대기 중인 학생이 없습니다 — 모두 모둠에 배치됨</div>';
    return;
  }

  poolStudents.forEach(s => poolEl.appendChild(makeChip(s)));
}

function renderGroups() {
  groupsGridEl.innerHTML = '';
  for (let i = 0; i < numGroups; i++) {
    const card = makeGroupCard(i);
    groupsGridEl.appendChild(card);
  }
  initGroupSortables();
}

function makeChip(student) {
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.dataset.id = student.id;

  if (student.state === 'manual' && student.group !== null) {
    const c = PALETTE[student.group % PALETTE.length];
    chip.classList.add('is-manual');
    chip.style.setProperty('--g-color', c.color);
    chip.style.setProperty('--g-light', c.light);
    chip.innerHTML = `<span class="pin">📌</span>${escHtml(student.name)}`;
  } else if (student.state === 'auto' && student.group !== null) {
    const c = PALETTE[student.group % PALETTE.length];
    chip.classList.add('is-auto');
    chip.style.setProperty('--g-light', c.light);
    chip.style.setProperty('--g-dark', c.dark);
    chip.textContent = student.name;
  } else {
    chip.textContent = student.name;
  }
  return chip;
}

function makeGroupCard(idx) {
  const c = PALETTE[idx % PALETTE.length];
  const card = document.createElement('div');
  card.className = 'group-card';
  card.dataset.group = String(idx);
  card.style.setProperty('--g-color', c.color);
  card.style.setProperty('--g-light', c.light);
  card.style.setProperty('--g-dark', c.dark);
  card.style.setProperty('--g-border', c.color + '40');

  const members = students.filter(s => s.group === idx);
  card.innerHTML = `
    <div class="group-header">
      <span>${idx + 1}모둠</span>
      <span class="group-count">${members.length}명</span>
    </div>
    <div class="group-body" data-group="${idx}"></div>
  `;

  const body = card.querySelector('.group-body');
  if (members.length === 0) {
    body.innerHTML = '<div class="empty-drop">여기로 드래그</div>';
  } else {
    members.forEach(s => body.appendChild(makeChip(s)));
  }
  return card;
}

function updateCounts() {
  const poolCount = students.filter(s => s.state === 'pool').length;
  poolCountEl.textContent = poolCount;
}

function updateActionButtons() {
  const hasStudents = students.length > 0;
  const hasPool     = students.some(s => s.state === 'pool');
  const hasAssigned = students.some(s => s.group !== null);
  const hasAuto     = students.some(s => s.state === 'auto');

  randomBtn.disabled    = !hasPool;
  reshuffleBtn.disabled = !hasAuto;
  copyBtn.disabled      = !hasAssigned;
  printBtn.disabled     = !hasAssigned;
}

function enableActionButtons() {
  updateActionButtons();
}

// ── Sortable 초기화 ──
let poolSortable = null;

function initPoolSortable() {
  if (poolSortable) poolSortable.destroy();
  poolSortable = Sortable.create(poolEl, {
    group: 'students',
    animation: 150,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    dragClass: 'sortable-drag',
    onAdd: (evt) => {
      const id = parseInt(evt.item.dataset.id);
      const student = students.find(s => s.id === id);
      if (student) {
        student.state = 'pool';
        student.group = null;
      }
      // 이동된 이름표의 모양을 새 상태에 맞게 갱신
      requestAnimationFrame(render);
    }
  });
}

function initGroupSortables() {
  groupsGridEl.querySelectorAll('.group-body').forEach(body => {
    Sortable.create(body, {
      group: 'students',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      onAdd: (evt) => {
        const id = parseInt(evt.item.dataset.id);
        const targetGroup = parseInt(evt.to.dataset.group);
        const student = students.find(s => s.id === id);
        if (student) {
          // 드래그로 모둠에 넣으면 "수동" 상태로 승격
          student.state = 'manual';
          student.group = targetGroup;
        }
        requestAnimationFrame(render);
      },
      onStart: () => {},
      onEnd: () => {}
    });
  });
}

// ── 랜덤 배치 (수정된 균등 배분 알고리즘) ──
randomBtn.addEventListener('click', () => {
  distributeRandom();
  render();
});

function distributeRandom() {
  const poolStudents = students.filter(s => s.state === 'pool');
  if (poolStudents.length === 0) return;

  const shuffled = shuffle([...poolStudents]);
  const total = students.length;

  // 핵심: baseSize 기준 + 나머지(extra)만큼만 +1
  const baseSize = Math.floor(total / numGroups);
  const extra    = total - baseSize * numGroups;
  const targetSizes = [];
  for (let i = 0; i < numGroups; i++) {
    targetSizes.push(i < extra ? baseSize + 1 : baseSize);
  }

  // 현재 각 모둠의 인원 수
  const currentSizes = Array(numGroups).fill(0);
  students.forEach(s => { if (s.group !== null) currentSizes[s.group]++; });

  // 각 모둠을 목표 인원까지 채움
  let idx = 0;
  for (let g = 0; g < numGroups; g++) {
    const needed = targetSizes[g] - currentSizes[g];
    for (let k = 0; k < needed && idx < shuffled.length; k++) {
      shuffled[idx].state = 'auto';
      shuffled[idx].group = g;
      currentSizes[g]++;
      idx++;
    }
  }

  // 그래도 남은 학생(어떤 모둠이 이미 목표 초과인 경우)은 가장 작은 모둠에 추가
  while (idx < shuffled.length) {
    let minIdx = 0;
    for (let i = 1; i < numGroups; i++) {
      if (currentSizes[i] < currentSizes[minIdx]) minIdx = i;
    }
    shuffled[idx].state = 'auto';
    shuffled[idx].group = minIdx;
    currentSizes[minIdx]++;
    idx++;
  }
}

// ── 자동 배치만 다시 섞기 ──
reshuffleBtn.addEventListener('click', () => {
  students.forEach(s => {
    if (s.state === 'auto') {
      s.state = 'pool';
      s.group = null;
    }
  });
  distributeRandom();
  render();
  showToast('자동 배치된 학생만 다시 섞었습니다.');
});

// ── 결과 복사 ──
copyBtn.addEventListener('click', () => {
  let text = '';
  for (let i = 0; i < numGroups; i++) {
    const members = students.filter(s => s.group === i);
    if (members.length === 0) continue;
    text += `[${i + 1}모둠]\n` + members.map(s => s.name).join('\n') + '\n\n';
  }
  const remaining = students.filter(s => s.state === 'pool');
  if (remaining.length > 0) {
    text += `[미배치]\n` + remaining.map(s => s.name).join('\n');
  }

  navigator.clipboard.writeText(text.trim())
    .then(() => showToast('클립보드에 복사됐습니다!'))
    .catch(() => showToast('복사 실패 — 직접 선택해 복사해주세요.'));
});

// ── 인쇄 ──
printBtn.addEventListener('click', () => window.print());

// ── 처음부터 ──
resetBtn.addEventListener('click', () => {
  if (students.length > 0 && !confirm('지금까지 작업을 모두 지웁니다. 계속하시겠어요?')) return;
  students = [];
  namesEl.value = '';
  numGroups = 4;
  numValueEl.textContent = '4';
  decBtn.disabled = false;
  incBtn.disabled = false;
  updateNameCount();
  render();
  showToast('처음 상태로 돌렸습니다.');
});

// ── 유틸 ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function escHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── 초기 렌더 ──
render();
initPoolSortable();
updateNameCount();
</script>
